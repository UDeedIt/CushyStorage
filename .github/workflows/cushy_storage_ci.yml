name: Cushy Storage CI

on:
#  push:
#    branches: [ "master", "develop", "feature/**", "hotfix/**" ]

  # Runs only when you open or update a PR to these branches
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  build:
    name: Build & Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Full build
        run: ./gradlew build
